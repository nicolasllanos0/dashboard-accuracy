
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P&L Accuracy FY2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{background:#0D1B2A;color:#E0E6F0;min-height:100vh;font-size:13px}

.hdr{background:linear-gradient(135deg,#002D72,#0057B3);padding:11px 20px;
     display:flex;justify-content:space-between;align-items:center;
     border-bottom:3px solid #FFC220;position:sticky;top:0;z-index:100}
.h-title{font-size:1.05rem;font-weight:700;color:#FFC220}
.h-sub{font-size:.67rem;color:#B0C4DE;margin-top:2px}
.h-badge{background:#FFC220;color:#002D72;padding:2px 10px;
         border-radius:10px;font-size:.68rem;font-weight:700}

/* Leyenda accuracy */
.legend-bar{background:#071525;padding:5px 20px;display:flex;gap:20px;
            align-items:center;border-bottom:1px solid #1A3A5C;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:.67rem;color:#90A4AE}
.ldot{width:9px;height:9px;border-radius:50%}

/* FILTROS */
.filter-bar{background:#0A1628;padding:7px 20px;display:flex;gap:18px;
            align-items:center;flex-wrap:wrap;border-bottom:1px solid #1A3A5C;
            position:sticky;top:49px;z-index:99}
.f-lbl{font-size:.63rem;font-weight:700;color:#90A4AE;
       text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:3px 11px;border-radius:12px;border:1px solid #2A4A6A;
      background:#112240;color:#7A9ABE;font-size:.68rem;cursor:pointer;
      transition:all .15s;user-select:none}
.chip:hover{border-color:#0071CE;color:#90C8FF}
.chip.on{background:#0057B3;color:#fff;border-color:#0071CE;font-weight:600}
.fsep{width:1px;height:22px;background:#1A3A5C}

/* TABS */
.tab-bar{background:#071525;border-bottom:2px solid #1A3A5C;
         display:flex;overflow-x:auto;position:sticky;top:88px;z-index:98}
.tab{padding:8px 18px;cursor:pointer;color:#607D8B;font-size:.75rem;
     font-weight:600;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s}
.tab:hover{color:#FFC220;background:#0F1E33}
.tab.active{color:#FFC220;border-bottom-color:#FFC220;background:#0F1E33}
.tab-pane{display:none}.tab-pane.active{display:block}

/* TABLA */
.tbl-wrap{overflow-x:auto}
.pnl{border-collapse:collapse;font-size:.68rem;min-width:max-content}
.pnl th,.pnl td{padding:3px 7px;white-space:nowrap}
.pnl thead th{position:sticky;top:0;z-index:4}

/* HEADER FIJO */
.th-fix{background:#002060;color:#FFC220;font-weight:700;font-size:.64rem;
        text-align:left;min-width:220px;max-width:250px;
        position:sticky;left:0;z-index:12;
        border-right:2px solid #1A3A5C;border-bottom:1px solid #1A3A5C}

/* MES HEADER */
.th-mes{font-weight:700;font-size:.62rem;text-align:center;
        border-bottom:1px solid #0A1628;padding:4px 6px}
.th-mes.cl{background:#0B2B18;color:#81C784}   /* cerrado - verde oscuro */
.th-mes.op{background:#1C1200;color:#FFB74D}   /* abierto - naranja oscuro */

/* SUB-HEADERS */
.th-v{background:#0D2044;color:#7EC8FF;font-size:.59rem;font-weight:600;
      text-align:center;border-bottom:2px solid #071525}
.th-p{background:#192030;color:#607D8B;font-size:.59rem;font-weight:600;
      text-align:center;border-bottom:2px solid #071525}
.th-a{background:#0A1830;color:#78909C;font-size:.59rem;font-weight:600;
      text-align:center;border-bottom:2px solid #071525}

/* CELDAS */
.td-fix{font-weight:600;color:#CFD8DC;position:sticky;left:0;z-index:3;
        background:#0F1F35;border-right:2px solid #1A3A5C;
        max-width:250px;overflow:hidden;text-overflow:ellipsis;font-size:.66rem}
.td-fix.tot{background:#071525;color:#FFC220;font-weight:700}
.td-v{color:#7EC8FF;text-align:right;font-variant-numeric:tabular-nums}
.td-p{color:#455A64;text-align:right;font-variant-numeric:tabular-nums}
.td-a{text-align:center;font-weight:700;font-size:.64rem;padding:2px 4px}
.td-a.pos{color:#66BB6A}.td-a.neg{color:#EF5350}.td-a.nd{color:#2A3A4A}

.tr-even{background:#0A1628}.tr-odd{background:#0D1F35}
.tr-tot{background:#060F1C}.tr-tot td{font-weight:700}

.sec-hdr{padding:9px 20px;font-size:.8rem;font-weight:700;color:#FFC220;
         background:#071525;border-bottom:1px solid #1A3A5C;
         border-top:2px solid #0071CE;margin-top:10px}
.sec-hdr:first-child{margin-top:0}
</style>
</head>

<div class="hdr">
  <div>
    <div class="h-title">&#128202; P&amp;L Accuracy &mdash; FY2026</div>

<div class="filter-bar">
  <span class="f-lbl">Formato</span>
  <div class="chips" id="cFmt"></div>

</div>

<div class="tab-bar">

</div>

// --- estado filtros ---
let selFmt   = new Set(D.formatos);
let selCanal = new Set(D.canales);
let activeTab = 'pnl';

// --- init ---
document.getElementById('badgeFecha').textContent = D.fecha;
document.getElementById('subtitulo').innerHTML =
  'Cerrados (<strong>'+D.cerrados.join(', ')+'</strong>): Actual/Plan &nbsp;|&nbsp; '
  +'Abiertos ('+D.meses.filter(m=>!D.cerrados.includes(m)).join(', ')+'): Fcst/Plan';

// --- chips ---
function buildChips(){
  document.getElementById('cFmt').innerHTML   = D.formatos.map(f=>
    `<div class="chip ${selFmt.has(f)?'on':''}" onclick="tgFmt('${f}')">${f}</div>`).join('');
  document.getElementById('cCanal').innerHTML = D.canales.map(c=>
    `<div class="chip ${selCanal.has(c)?'on':''}" onclick="tgCanal('${c}')">${c}</div>`).join('');
}
buildChips();

function tgFmt(f){
  selFmt = (selFmt.size===1&&selFmt.has(f)) ? new Set(D.formatos) : new Set([f]);
  buildChips(); refreshAll();
}
function tgCanal(c){
  selCanal = (selCanal.size===1&&selCanal.has(c)) ? new Set(D.canales) : new Set([c]);
  buildChips(); refreshAll();
}

// --- tab ---
function goTab(name,el){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active'); activeTab=name; refreshAll();
}

// --- obtener PNL ---
function getPNL(fmts,canals){
  const fk = fmts.length===D.formatos.length?'_ALL':(fmts.length===1?fmts[0]:null);
  const ck = canals.length===D.canales.length?'_ALL':(canals.length===1?canals[0]:null);
  if(fk&&ck)   return D.pnl[fk][ck];
  if(fk&&!ck)  return sum(canals.map(c=>D.pnl[fk][c]));
  if(!fk&&ck)  return sum(fmts.map(f=>D.pnl[f][ck]));
  return sum(fmts.flatMap(f=>canals.map(c=>D.pnl[f][c])));
}

function sum(arrs){
  if(!arrs||!arrs.length) return [];
  if(arrs.length===1) return arrs[0];
  // deep copy del primero, poner vals a null
  const res = arrs[0].map(row=>({
    agrupador: row.agrupador,
    meses: row.meses.map(m=>({mes:m.mes,valor:null,plan:null,cerrado:m.cerrado}))
  }));
  arrs.forEach(arr=>arr.forEach((row,ri)=>row.meses.forEach((m,mi)=>{
    if(m.valor!==null) res[ri].meses[mi].valor=(res[ri].meses[mi].valor||0)+m.valor;
    if(m.plan!==null)  res[ri].meses[mi].plan =(res[ri].meses[mi].plan ||0)+m.plan;
  })));
  return res;
}

// --- formato numeros ---
const fm = v=> v==null?'\u2014':v.toLocaleString('es-CL',{minimumFractionDigits:3,maximumFractionDigits:3});
const pct= a=> a==null?'N/D':(a*100).toFixed(1)+'%';
function accCls(a,agr){
  if(a==null) return 'nd';
  const good = (D.agr_sign[agr]||1)>0 ? a>=1 : a<=1;
  return good?'pos':'neg';
}

// --- construir tabla ---
function buildTable(id, data){
  const tbl=document.getElementById(id);
  if(!tbl) return;

  // header fila 1 (meses)
  let h1=`<tr><th class="th-fix" rowspan="2">Linea P&amp;L</th>`;
  D.meses.forEach((m,i)=>{
    const cer = D.cerrados.includes(m);
    const wk  = D.mes_fcst[m]||'';
    const lbl = cer ? 'Actual' : ('Fcst '+wk);
    h1 += `<th class="th-mes ${cer?'cl':'op'}" colspan="3">
             ${D.meslabel[i]}<br>
             <span style="font-size:.55rem;font-weight:400">${lbl}</span></th>`;
  });
  h1+='</tr>';

  // header fila 2 (sub-col)
  let h2='<tr>';
  D.meses.forEach(m=>{
    const cer=D.cerrados.includes(m);
    const vlbl=cer?'Actual':('Fcst '+D.mes_fcst[m]);
    h2+=`<th class="th-v">${vlbl}</th><th class="th-p">Plan</th><th class="th-a">Acc%</th>`;
  });
  h2+='</tr>';

  // filas
  let rows='';
  data.forEach((row,ri)=>{
    const agr=row.agrupador;
    const tot=agr.startsWith('TOTAL')||agr.startsWith('P&L')||agr==='Brecha';
    const rc=tot?'tr-tot':(ri%2===0?'tr-even':'tr-odd');
    const tc=tot?'td-fix tot':'td-fix';
    let cells='';
    row.meses.forEach(m=>{
      const acc = (m.plan!=null&&m.plan!==0&&m.valor!=null) ? m.valor/m.plan : null;
      cells+=`<td class="td-v">${fm(m.valor)}</td>
              <td class="td-p">${fm(m.plan)}</td>
              <td class="td-a ${accCls(acc,agr)}">${pct(acc)}</td>`;
    });
    rows+=`<tr class="${rc}"><td class="${tc}" title="${agr}">${agr}</td>${cells}</tr>`;
  });
  tbl.innerHTML=`<thead>${h1}${h2}</thead><tbody>${rows}</tbody>`;
}

// --- secciones ---
function buildSections(cid, keys, type){
  const el=document.getElementById(cid);
  if(!el) return;
  const fmts=[...selFmt], canals=[...selCanal];
  const active=type==='fmt'?fmts:canals;
  let html='';
  keys.filter(k=>active.includes(k)).forEach(k=>{
    const pnl=type==='fmt'?getPNL([k],canals):getPNL(fmts,[k]);
    const tid='s'+btoa(encodeURIComponent(k)).replace(/[^a-z0-9]/gi,'_');
    html+=`<div class="sec-hdr">${type==='fmt'?'&#127968;':'&#128722;'} ${k}</div>
           <div class="tbl-wrap"><table class="pnl" id="${tid}"></table></div>`;
  });
  el.innerHTML=html;
  keys.filter(k=>active.includes(k)).forEach(k=>{
    const pnl=type==='fmt'?getPNL([k],canals):getPNL(fmts,[k]);
    const tid='s'+btoa(encodeURIComponent(k)).replace(/[^a-z0-9]/gi,'_');
    buildTable(tid,pnl);
  });
}

function refreshAll(){
  const f=[...selFmt],c=[...selCanal];
  if(activeTab==='pnl')   buildTable('tbl-pnl',getPNL(f,c));
  if(activeTab==='fmt')   buildSections('sec-fmt',  D.formatos,'fmt');
  if(activeTab==='canal') buildSections('sec-canal',D.canales, 'canal');
}
refreshAll();
