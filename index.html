
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P&L Accuracy FY2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{background:#0D1B2A;color:#E0E6F0;min-height:100vh;font-size:13px}

/* HEADER */
.hdr{background:linear-gradient(135deg,#003F87 0%,#0057B3 100%);padding:12px 20px;
     display:flex;justify-content:space-between;align-items:center;
     border-bottom:3px solid #FFC220;position:sticky;top:0;z-index:100}
.h-title{font-size:1.05rem;font-weight:700;color:#FFC220}
.h-sub{font-size:.68rem;color:#B0C4DE;margin-top:2px}
.h-badge{background:#FFC220;color:#003F87;padding:2px 10px;border-radius:10px;
         font-size:.7rem;font-weight:700;white-space:nowrap}

/* FILTROS */
.filter-bar{background:#0A1628;padding:8px 20px;display:flex;gap:20px;
            align-items:center;flex-wrap:wrap;border-bottom:1px solid #1A3A5C;
            position:sticky;top:49px;z-index:99}
.f-group{display:flex;align-items:center;gap:8px}
.f-label{font-size:.65rem;font-weight:700;color:#90A4AE;text-transform:uppercase;
         letter-spacing:.5px;white-space:nowrap}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:3px 11px;border-radius:12px;border:1px solid #2A4A6A;
      background:#112240;color:#7A9ABE;font-size:.68rem;cursor:pointer;
      transition:all .15s;white-space:nowrap;user-select:none}
.chip:hover{border-color:#0071CE;color:#90C8FF}
.chip.on{background:#0057B3;color:#fff;border-color:#0071CE;font-weight:600}
.chip.cerrado-tag{background:#0D2B1A;color:#80C887;border-color:#2E7D32;cursor:default}
.chip.fcst-tag{background:#1A1200;color:#FFB74D;border-color:#E65100;cursor:default}
.f-sep{width:1px;height:24px;background:#1A3A5C}

/* TABS */
.tab-bar{background:#091525;border-bottom:2px solid #1A3A5C;
         display:flex;overflow-x:auto;position:sticky;top:92px;z-index:98}
.tab{padding:8px 20px;cursor:pointer;color:#607D8B;font-size:.75rem;font-weight:600;
     white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s}
.tab:hover{color:#FFC220;background:#0F1E33}
.tab.active{color:#FFC220;border-bottom-color:#FFC220;background:#0F1E33}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* TABLA P&L */
.tbl-wrap{overflow-x:auto;padding:0}
.pnl{border-collapse:collapse;font-size:.68rem;min-width:max-content}
.pnl th,.pnl td{padding:3px 8px;white-space:nowrap}
.pnl thead th{position:sticky;top:0}

/* HEADERS */
.th-fix{background:#002966;color:#FFC220;font-weight:700;font-size:.65rem;
        text-align:left;min-width:230px;max-width:260px;position:sticky;
        left:0;z-index:20;border-right:2px solid #1A3A5C;border-bottom:1px solid #1A3A5C}
.th-mes-hdr{font-weight:700;font-size:.63rem;text-align:center;border-bottom:1px solid #1A3A5C}
.th-mes-hdr.cerrado{background:#0D2B1A;color:#A5D6A7}
.th-mes-hdr.abierto{background:#1C1000;color:#FFCC80}
.th-sub{font-size:.6rem;font-weight:600;text-align:center;border-bottom:2px solid #0A1628}
.th-sub.v{background:#0D2044;color:#7EC8FF}
.th-sub.p{background:#1A2030;color:#78909C}
.th-sub.a{background:#091825;color:#90A4AE}

/* CELDAS */
.td-fix{font-weight:600;color:#CBD5E0;position:sticky;left:0;z-index:5;
        background:#0F1E33;border-right:2px solid #1A3A5C;font-size:.67rem;
        max-width:260px;overflow:hidden;text-overflow:ellipsis}
.td-fix.subtotal{background:#091525;color:#FFC220;font-weight:700;font-size:.68rem}
.td-v{color:#7EC8FF;text-align:right;font-variant-numeric:tabular-nums}
.td-p{color:#546E7A;text-align:right;font-variant-numeric:tabular-nums}
.td-a{text-align:center;font-weight:700;font-size:.65rem;border-radius:3px;
      padding:2px 5px}
.td-a.pos{color:#81C784}.td-a.neg{color:#E57373}.td-a.nd{color:#3A4A5A}

.row-even{background:#0A1628}.row-odd{background:#0D1F35}
.row-sub{background:#071020}.row-sub td{font-weight:700}

/* seccion por formato/canal */
.sec-title{padding:10px 20px;font-size:.8rem;font-weight:700;color:#FFC220;
           background:#091525;border-bottom:1px solid #1A3A5C;border-top:2px solid #0071CE;
           margin-top:12px}
.sec-title:first-child{margin-top:0}

@media(max-width:700px){.filter-bar{top:44px}.tab-bar{top:82px}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="h-title">&#128202; P&amp;L Accuracy &mdash; FY2026</div>
    <div class="h-sub">
      Meses cerrados (Actual): <strong id="lbl_cerrado"></strong> &nbsp;|

    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">

    <div class="h-badge" id="badgeFecha"></div>
  </div>
</div>

<!-- BARRA FILTROS -->
<div class="filter-bar">
  <div class="f-group">
    <span class="f-label">Formato</span>

  </div>
  <div class="f-sep"></div>
  <div class="f-group">
    <span class="f-label">Canal</span>

  </div>
  <div class="f-sep"></div>
  <div class="f-group" style="font-size:.65rem;gap:6px">
    <span class="chip cerrado-tag">&#9679; Actual (cerrado)</span>
    <span class="chip fcst-tag">&#9651; Forecast (abierto)</span>
  </div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <div class="tab active" onclick="goTab('pnl',this)">&#128203; P&amp;L Accuracy</div>
  <div class="tab" onclick="goTab('fmt',this)">&#127968; Por Formato</div>
  <div class="tab" onclick="goTab('canal',this)">&#128722; Por Canal</div>
</div>

<!-- TAB P&L -->
<div id="tab-pnl" class="tab-pane active">
  <div class="tbl-wrap"><table class="pnl" id="tbl-pnl"></table></div>
</div>

<!-- TAB FORMATO -->
<div id="tab-fmt" class="tab-pane">
  <div id="sec-fmt"></div>
</div>

<!-- TAB CANAL -->
<div id="tab-canal" class="tab-pane">
  <div id="sec-canal"></div>
</div>

// ---- Estado filtros ----
let selFmt   = new Set(D.formatos);
let selCanal = new Set(D.canales);

// ---- Init header ----
document.getElementById('badgeFecha').textContent = D.fecha;
document.getElementById('lbl_cerrado').textContent = D.meses_cerrados.join(', ');
document.getElementById('lbl_abierto').textContent =
  D.meses.filter(m=>!D.meses_cerrados.includes(m)).join(', ');

// ---- Chips ----
function buildChips(){
  document.getElementById('cFmt').innerHTML = D.formatos.map(f=>
    `<div class="chip ${selFmt.has(f)?'on':''}" onclick="toggleFmt('${f}')">${f}</div>`
  ).join('');
  document.getElementById('cCanal').innerHTML = D.canales.map(c=>
    `<div class="chip ${selCanal.has(c)?'on':''}" onclick="toggleCanal('${c}')">${c}</div>`
  ).join('');
}
buildChips();

function toggleFmt(f){
  if(selFmt.has(f)){ if(selFmt.size>1) selFmt.delete(f); } else selFmt.add(f);
  buildChips(); refreshAll();
}
function toggleCanal(c){
  if(selCanal.has(c)){ if(selCanal.size>1) selCanal.delete(c); } else selCanal.add(c);
  buildChips(); refreshAll();
}

// ---- Tab switch ----
let activeTab = 'pnl';
function goTab(name, el){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
  activeTab = name;
  refreshAll();
}

// ---- Obtener datos filtrados (suma de combinaciones) ----
function getPNL(fmts, canals){
  // caso rapido: combinacion exacta disponible
  const fKey = fmts.length===D.formatos.length ? '_ALL' : (fmts.length===1 ? fmts[0] : null);
  const cKey = canals.length===D.canales.length ? '_ALL' : (canals.length===1 ? canals[0] : null);
  if(fKey && cKey) return D.pnl_combo[fKey][cKey];
  if(fKey && !cKey) {
    // formato fijo, multiples canales => sumar canales individuales
    return sumPNL(canals.map(c => D.pnl_combo[fKey][c]));
  }
  if(!fKey && cKey) {
    return sumPNL(fmts.map(f => D.pnl_combo[f][cKey]));
  }
  // multiples formatos y canales
  const arrays = [];
  fmts.forEach(f => canals.forEach(c => arrays.push(D.pnl_combo[f][c])));
  return sumPNL(arrays);
}

function sumPNL(arrays){
  if(!arrays||arrays.length===0) return [];
  if(arrays.length===1) return arrays[0];
  // Inicializar con estructura del primero
  const res = arrays[0].map(row=>({agrupador:row.agrupador,
    meses:row.meses.map(m=>({mes:m.mes,valor:null,plan:null,esc:m.esc}))}));
  // Sumar
  arrays.forEach(arr=>{
    arr.forEach((row,ri)=>row.meses.forEach((m,mi)=>{
      if(m.valor!==null) res[ri].meses[mi].valor=(res[ri].meses[mi].valor||0)+m.valor;
      if(m.plan!==null)  res[ri].meses[mi].plan =(res[ri].meses[mi].plan ||0)+m.plan;
    }));
  });
  return res;
}

// ---- Accuracy ----
const fm = (v,d=2)=> v==null?'—':v.toLocaleString('es-CL',{minimumFractionDigits:d,maximumFractionDigits:d});
function calcAcc(valor,plan){ return (plan!=null&&plan!==0&&valor!=null) ? valor/plan : null; }
function fmtAcc(acc){ if(acc==null) return 'N/D'; return (acc*100).toFixed(1)+'%'; }
function accCls(acc, agr){
  if(acc==null) return 'nd';
  const sign = D.agr_sign[agr]||1;
  // Para ingresos (sign>0): acc>1 es bueno. Para costos (sign<0): acc<1 es bueno
  const good = sign>0 ? acc>=1 : acc<=1;
  return good ? 'pos' : 'neg';
}

// ---- Construir tabla P&L ----
function buildTable(tableId, pnlData){
  const tbl = document.getElementById(tableId);
  if(!tbl) return;

  // === HEADER ===
  let h1 = `<tr>
    <th class="th-fix" rowspan="2">Linea P&amp;L</th>
    ${D.meses.map((m,i)=>{
      const cer = D.meses_cerrados.includes(m);
      const wk  = D.mes_fcst[m]||'';
      return `<th class="th-mes-hdr ${cer?'cerrado':'abierto'}" colspan="3">
        ${D.meses_label[i]} <span style="font-size:.55rem">(${wk})</span>
      </th>`;
    }).join('')}
  </tr>`;
  let h2 = `<tr>
    ${D.meses.map(m=>{
      const wk = D.mes_fcst[m]||'Fcst';
      const cer= D.meses_cerrados.includes(m);
      return `
        <th class="th-sub v">Valor ${cer?'Actual':wk}</th>
        <th class="th-sub p">Plan</th>
        <th class="th-sub a">Acc%</th>`;
    }).join('')}
  </tr>`;

  // === FILAS ===
  let rows = '';
  pnlData.forEach((row,ri)=>{
    const agr = row.agrupador;
    const isSub = agr.startsWith('TOTAL')||agr.startsWith('P&L')||agr==='Brecha';
    const rowCls = isSub ? 'row-sub' : (ri%2===0?'row-even':'row-odd');
    const tdCls  = isSub ? 'td-fix subtotal' : 'td-fix';
    let cells = '';
    row.meses.forEach(m=>{
      const acc = calcAcc(m.valor, m.plan);
      const aCls= accCls(acc, agr);
      cells += `
        <td class="td-v">${fm(m.valor)}</td>
        <td class="td-p">${fm(m.plan)}</td>
        <td class="td-a ${aCls}">${fmtAcc(acc)}</td>`;
    });
    rows += `<tr class="${rowCls}">
      <td class="${tdCls}" title="${agr}">${agr}</td>
      ${cells}
    </tr>`;
  });

  tbl.innerHTML = `<thead>${h1}${h2}</thead><tbody>${rows}</tbody>`;
}

// ---- Construir seccion multi-formato o multi-canal ----
function buildSections(containerId, keyList, keyType){
  const el = document.getElementById(containerId);
  if(!el) return;
  const fmts  = [...selFmt];
  const canals = [...selCanal];
  let html = '';
  keyList.forEach(key=>{
    // No mostrar si no esta en la seleccion activa
    if(keyType==='fmt'  && !selFmt.has(key))   return;
    if(keyType==='canal'&& !selCanal.has(key)) return;
    const pnl = keyType==='fmt'
      ? getPNL([key], canals)
      : getPNL(fmts,  [key]);
    const tblId = 'sec-tbl-'+btoa(key).replace(/[^a-z0-9]/gi,'_');
    html += `<div class="sec-title">${keyType==='fmt'?'&#127968;':'&#128722;'} ${key}</div>
             <div class="tbl-wrap"><table class="pnl" id="${tblId}"></table></div>`;
    el.innerHTML = html;
    buildTable(tblId, pnl);
  });
  el.innerHTML = html;
  // render todas
  keyList.forEach(key=>{
    if(keyType==='fmt'  && !selFmt.has(key))   return;
    if(keyType==='canal'&& !selCanal.has(key)) return;
    const tblId = 'sec-tbl-'+btoa(key).replace(/[^a-z0-9]/gi,'_');
    const pnl = keyType==='fmt'
      ? getPNL([key], canals)
      : getPNL(fmts,  [key]);
    buildTable(tblId, pnl);
  });
}

// ---- Refresh segun tab activo ----
function refreshAll(){
  const fmts  = [...selFmt];
  const canals = [...selCanal];
  if(activeTab==='pnl')   buildTable('tbl-pnl', getPNL(fmts,canals));
  if(activeTab==='fmt')   buildSections('sec-fmt',   D.formatos, 'fmt');
  if(activeTab==='canal') buildSections('sec-canal', D.canales,  'canal');
}

// Render inicial
refreshAll();
